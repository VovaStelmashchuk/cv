name: Build CV

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vovastelmashchuk/cv
  HOST: ${{ vars.HOST }}
  SSH_KEY: ${{ secrets.ROOT_SSH_PRIVATE_KEY }}
  COMMIT_SHA: ${{ github.sha }}
  USERNAME: ${{ vars.USERNAME }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for Docker Stack
        run: |
          echo "IMAGE_NAME='${{ env.IMAGE_NAME }}'" >> .env
          echo "COMMIT_SHA='${{ env.COMMIT_SHA }}'" >> .env

      - name: Setup docker remote context
        uses: cssnr/stack-deploy-action@v1
        with:
          name: cv
          file: docker-stack.yml
          host: ${{ env.HOST}}
          port: 22
          user: ${{ env.USERNAME }}
          ssh_key: ${{ env.SSH_KEY }}
          env_file: .env
          detach: false
          prune: true
          resolve_image: 'always'
          summary: true
